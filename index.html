    /* reset & base – pure gray, no distractions */
    * {

    html, body {
      width: 100%;
      min-height: 100vh;
      background: #888b8d;  /* neutral gray */

    .gray-screen {
      background: #7f8285;
      width: 100%;
      min-height: 100vh;
      padding: 18px 14px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .ad-grid {
      max-width: 1300px;
      width: 100%;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 22px;
      justify-content: center;
      align-content: start;
    }

    .ad-card {
      background: #9a9ea1;
      border-radius: 20px;
      padding: 18px 14px 14px;
      box-shadow: inset 0 1px 3px rgba(255,255,255,0.1), 0 6px 14px rgba(0,0,0,0.15);
      border: 1px solid #6b6f72;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: box-shadow 0.1s ease;
      min-height: 150px;
    }

    .ad-card:hover {
      box-shadow: inset 0 1px 3px rgba(255,255,255,0.15), 0 8px 20px rgba(0,0,0,0.2);
    }

    .ad-badge {
      font-size: 9px;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      color: #d3d9de;
      background: #5d6266;
      padding: 2px 16px;
      border-radius: 40px;
      margin-bottom: 14px;
      font-weight: 500;
      user-select: none;
      border: 1px solid #6f7478;
      opacity: 0.7;
    }

    .adsense-wrap {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      background: transparent;
      min-height: 80px;
    }

    .adsense-wrap ins.adsbygoogle {
      display: block;
      width: 100%;
      max-width: 100%;
      background: transparent;
    }

    .ad-slot-display { width: 100%; min-height: 90px; }
    .ad-slot-inarticle { width: 100%; min-height: 120px; }
    .ad-slot-multiplex { width: 100%; min-height: 200px; }
    .ad-slot-auto { width: 100%; min-height: 100px; }
    .ad-slot-link { width: 100%; min-height: 80px; }

    .ad-placeholder {
      color: #a8b0b8;
      font-size: 11px;
      text-align: center;
      padding: 14px 6px;
      width: 100%;
      background: #7e8387;
      border-radius: 40px;
      border: 1px dashed #6a7075;
      display: none;
    }

    .gray-footer {
      margin-top: 32px;
      padding: 16px 0 6px;
      font-size: 10px;
      color: #b9c2ca;
      text-align: center;
      border-top: 1px solid #6e7377;
      width: 100%;
      max-width: 1300px;
      letter-spacing: 0.3px;
      opacity: 0.5;
    }

    @media (max-width: 600px) {
      .gray-screen { padding: 12px 8px 30px; }
      .ad-card { padding: 14px 10px; min-height: 120px; }
      .ad-badge { font-size: 8px; padding: 2px 12px; }
    }

    .adsense-wrap > * {
      max-width: 100%;
    }

    /* GitHub Pages friendly: ensure full height */
    .gray-screen {
      min-height: 100vh;
      min-height: 100dvh;
    }
