    /* ===== CONSENT OVERLAY - blocks everything until you choose ===== */
    .consent-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;

      backdrop-filter: blur(8px);

      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 20px;
      transition: opacity 0.4s ease, visibility 0.4s ease;
    }

      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .consent-box {
      background: #2d2f31;
      max-width: 600px;
      width: 100%;
      padding: 40px 36px 32px;
      border-radius: 28px;
      border: 1px solid #4a4f54;
      box-shadow: 0 24px 60px rgba(0,0,0,0.5);
      text-align: center;
    }

    .consent-box h2 {
      color: #f0f4fa;
      font-weight: 500;
      font-size: 1.5rem;
      margin-bottom: 10px;
    }

    .consent-box p {
      color: #b8c2cc;
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 28px;
    }

    .consent-box .site-name {
      color: #8ab4f8;
      font-weight: 500;
      word-break: break-all;
    }

    .consent-buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .consent-buttons .btn {
      padding: 14px 20px;
      border-radius: 60px;
      font-size: 1rem;
      font-weight: 500;
      border: none;
      cursor: pointer;
      transition: 0.15s;
      width: 100%;
      letter-spacing: 0.3px;
    }

    .btn-consent {
      background: #1a73e8;
      color: white;
    }
    .btn-consent:hover { background: #1557b0; }

    .btn-decline {
      background: #3b4045;
      color: #e0e6ed;
      border: 1px solid #5b6268;
    }
    .btn-decline:hover { background: #4a5056; }

    .btn-manage {
      background: transparent;
      color: #b0b9c4;
      border: 1px solid #4a4f54;
      font-size: 0.9rem;
    }
    .btn-manage:hover { background: #3b4045; }

    .consent-divider {
      display: flex;
      align-items: center;
      gap: 14px;
      color: #5b6268;
      font-size: 0.75rem;
      margin: 4px 0;
    }
    .consent-divider::before,
    .consent-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #3f4449;
    }

    /* ===== MAIN PAGE - gray screen with ads ===== */

      background: #7f8285;
      width: 100%;
      min-height: 100vh;
      padding: 18px 14px 40px;

      flex-direction: column;
      align-items: center;

      width: 100%;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 22px;
    }

    .ad-card {
      background: #9a9ea1;
      border-radius: 20px;
      padding: 18px 14px 14px;
      border: 1px solid #6b6f72;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 140px;
    }

    .ad-badge {
      font-size: 9px;
      text-transform: uppercase;
      color: #d3d9de;
      background: #5d6266;
      padding: 2px 16px;
      border-radius: 40px;
      margin-bottom: 14px;

    .adsense-wrap {
      width: 100%;
      min-height: 80px;
    }
    .adsense-wrap ins.adsbygoogle {
      display: block;
      width: 100%;
    }

    .ad-slot-display { min-height: 90px; }
    .ad-slot-inarticle { min-height: 120px; }
    .ad-slot-multiplex { min-height: 200px; }
    .ad-slot-auto { min-height: 100px; }

      color: #b9c2ca;
      text-align: center;
      border-top: 1px solid #6e7377;

      max-width: 1300px;
