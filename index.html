<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <!-- AdSense Code -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3737861554144850"
     crossorigin="anonymous"></script>
  
  <script>
     (adsbygoogle = window.adsbygoogle || []).push({
       google_ad_client: "ca-pub-3737861554144850",
       enable_page_level_ads: true
     });
  </script>
  
  <title>gray · ads</title>
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      min-height: 100vh;
      background: #888b8d;
      font-family: system-ui, sans-serif;
    }
    .gray-screen {
      background: #7f8285;
      width: 100%;
      min-height: 100vh;
      padding: 18px 14px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .ad-grid {
      max-width: 1300px;
      width: 100%;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 22px;
    }
    .ad-card {
      background: #9a9ea1;
      border-radius: 20px;
      padding: 18px 14px 14px;
      border: 1px solid #6b6f72;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 140px;
    }
    .ad-badge {
      font-size: 9px;
      text-transform: uppercase;
      color: #d3d9de;
      background: #5d6266;
      padding: 2px 16px;
      border-radius: 40px;
      margin-bottom: 14px;
    }
    .adsense-wrap {
      width: 100%;
      min-height: 80px;
    }
    .adsense-wrap ins.adsbygoogle {
      display: block;
      width: 100%;
    }
    .ad-slot-display { min-height: 90px; }
    .ad-slot-inarticle { min-height: 120px; }
    .ad-slot-multiplex { min-height: 200px; }
    .ad-slot-auto { min-height: 100px; }
    .gray-footer {
      margin-top: 32px;
      padding: 16px 0 6px;
      font-size: 10px;
      color: #b9c2ca;
      text-align: center;
      border-top: 1px solid #6e7377;
      width: 100%;
      max-width: 1300px;
    }
  </style>
</head>
<body>
  <div class="gray-screen">
    <div class="ad-grid">
      <!-- 10 ad units - replace data-ad-slot with your actual slot IDs -->
      <div class="ad-card">
        <span class="ad-badge">▸ ad</span>
        <div class="adsense-wrap">
          <ins class="adsbygoogle ad-slot-display"
               style="display:block"
               data-ad-client="ca-pub-3737861554144850"
               data-ad-slot="1111111111"
               data-ad-format="auto"
               data-full-width-responsive="true"></ins>
          <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
        </div>
      </div>
      <!-- Repeat for ads 2-10 with different slot IDs -->
    </div>
    <div class="gray-footer">● ● ● google adsense ● ● ●</div>
  </div>
</body>
</html>
